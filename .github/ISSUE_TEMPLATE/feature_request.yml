name: Feature request
description: Suggest an idea for In Weeks
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: As a user, I find it hard to ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: I'd like to be able to ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also thought about ...
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: In Weeks is intentionally minimal. Please confirm your idea fits.
      options:
        - label: This doesn't require a backend, accounts, or tracking
          required: true
